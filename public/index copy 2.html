<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>PromptPay QR</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .btn-amount {
        font-size: 20px;
        padding: 15px;
        border-radius: 12px;
        transition: 0.2s;
      }

      .btn-amount:hover {
        transform: scale(1.05);
      }

      #qr {
        width: 260px;
        height: 260px;
        display: none;
        margin: auto;
      }

      #status {
        white-space: pre-line;
        font-size: 18px;
      }

      .title {
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4 text-center">
            <h3 class="title mb-4">💳 ชำระเงิน PromptPay</h3>

            <div class="mb-3">
              <input
                type="text"
                id="device_id"
                class="form-control"
                placeholder="Device ID (เช่น esp32-01)"
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                id="product"
                class="form-control"
                placeholder="ชื่อสินค้า (เช่น ล้างรถ)"
              />
            </div>

            <!-- ปุ่มเลือกเงิน -->
            <div class="d-grid gap-3 mb-4">
              <button class="btn btn-primary btn-amount" onclick="pay(1000)">
                10 บาท
              </button>
              <button class="btn btn-success btn-amount" onclick="pay(2000)">
                20 บาท
              </button>
              <button class="btn btn-warning btn-amount" onclick="pay(5000)">
                50 บาท
              </button>

              <button class="btn btn-secondary mt-2" onclick="resetUI()">
                🔄 เริ่มใหม่
              </button>
            </div>

            <!-- STATUS -->
            <div id="status" class="text-muted mb-3">กรุณาเลือกจำนวนเงิน</div>

            <!-- QR -->
            <div class="d-flex justify-content-center">
              <img id="qr" class="img-fluid" />
            </div>

            <!-- ปุ่มเช็ค -->
            <button
              id="checkBtn"
              class="btn btn-dark mt-3"
              onclick="checkPaymentManual()"
              disabled
            >
              🔍 ตรวจสอบสถานะ
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentOrderId = null;

      // ================= CREATE QR =================
      async function pay(amount) {
        try {
          document
            .querySelectorAll(".btn-amount")
            .forEach((btn) => (btn.disabled = true));

          document.getElementById("status").innerText = "⏳ กำลังสร้าง QR...";
          document.getElementById("qr").style.display = "none";
          document.getElementById("checkBtn").disabled = true;

          // ✅ ดึงค่า input
          const device_id =
            document.getElementById("device_id").value || "esp32-s3";

          const product =
            document.getElementById("product").value || "CAT CARWASH";

          const res = await fetch(
            "https://millennium-depends-featuring-utils.trycloudflare.com/create-qr",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                amount,
                device_id,
                product,
              }),
            }
          );

          const data = await res.json();

          if (data.success) {
            const qr = document.getElementById("qr");

            qr.src = data.qr;
            qr.style.display = "block";

            currentOrderId = data.orderId;

            document.getElementById(
              "status"
            ).innerText = `📱 สแกนเพื่อชำระเงิน\nOrder: ${data.orderId}\nDevice: ${device_id}\nสินค้า: ${product}`;

            document.getElementById("checkBtn").disabled = false;
          } else {
            document.getElementById("status").innerText =
              "❌ สร้าง QR ไม่สำเร็จ";

            document
              .querySelectorAll(".btn-amount")
              .forEach((btn) => (btn.disabled = false));
          }
        } catch (err) {
          console.error(err);
          document.getElementById("status").innerText = "❌ Error";

          document
            .querySelectorAll(".btn-amount")
            .forEach((btn) => (btn.disabled = false));
        }
      }
      // ================= MANUAL CHECK =================
      async function checkPaymentManual() {
        if (!currentOrderId) {
          alert("ยังไม่มีรายการ");
          return;
        }

        document.getElementById("status").innerText = "🔍 กำลังตรวจสอบ...";

        try {
          const res = await fetch(
            "https://millennium-depends-featuring-utils.trycloudflare.com/check-order",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ orderId: currentOrderId }),
            }
          );

          const data = await res.json();

          console.log("CHECK:", data);

          if (data.data && data.data.result === "SUCCESS") {
            document.getElementById("status").innerText = "✅ ชำระเงินสำเร็จ!";
            document.getElementById("qr").style.display = "none";
            document.getElementById("checkBtn").disabled = true;

            alert("ชำระเงินสำเร็จ 🎉");
          } else {
            document.getElementById("status").innerText = "⌛ ยังไม่ชำระเงิน";
          }
        } catch (err) {
          console.error(err);
          document.getElementById("status").innerText = "❌ Error";
        }
      }

      function resetUI() {
        currentOrderId = null;

        document.getElementById("qr").style.display = "none";
        document.getElementById("status").innerText = "กรุณาเลือกจำนวนเงิน";
        document.getElementById("checkBtn").disabled = true;

        // 🔓 ปลดล็อคปุ่ม
        document
          .querySelectorAll(".btn-amount")
          .forEach((btn) => (btn.disabled = false));
      }
    </script>
  </body>
</html>
