<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>PromptPay QR</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .btn-amount {
        font-size: 20px;
        padding: 15px;
        border-radius: 12px;
      }

      #qr {
        width: 260px;
        display: none;
        margin: auto;
      }

      #resultIcon {
        font-size: 70px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="col-md-5 mx-auto">
        <div class="card p-4 text-center">
          <h3 class="mb-4">💳 ชำระเงิน PromptPay</h3>

          <!-- INPUT -->
          <input
            type="text"
            id="device_id"
            class="form-control mb-2"
            placeholder="Device ID"
          />

          <input
            type="text"
            id="product"
            class="form-control mb-3"
            placeholder="สินค้า"
          />

          <!-- BUTTON -->
          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-primary btn-amount" onclick="pay(1000)">
              10 บาท
            </button>
            <button class="btn btn-success btn-amount" onclick="pay(2000)">
              20 บาท
            </button>
            <button class="btn btn-warning btn-amount" onclick="pay(5000)">
              50 บาท
            </button>

            <button class="btn btn-secondary" onclick="resetUI()">
              🔄 เริ่มใหม่
            </button>
          </div>

          <!-- STATUS -->
          <div id="status">กรุณาเลือกจำนวนเงิน</div>

          <!-- ICON -->
          <div id="resultIcon" class="my-3"></div>

          <!-- QR -->
          <img id="qr" />

          <!-- CHECK -->
          <button
            id="checkBtn"
            class="btn btn-dark mt-3"
            onclick="checkPayment()"
            disabled
          >
            🔍 ตรวจสอบสถานะ
          </button>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
      let currentOrderId = null;
      let mqttClient = null;

      // ================= ICON =================
      function renderStatus(status) {
        const el = document.getElementById("resultIcon");

        if (status === "SUCCESS") el.innerHTML = "✅";
        else if (status === "FAIL") el.innerHTML = "❌";
        else if (status === "CANCEL") el.innerHTML = "⚠️";
        else el.innerHTML = "";
      }
      // ================= connectMQTT =================
      function connectMQTT(orderId) {
        mqttClient = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

        mqttClient.on("connect", () => {
          console.log("MQTT connected");

          mqttClient.subscribe("payment/" + orderId);
        });

        mqttClient.on("message", (topic, message) => {
          const data = JSON.parse(message.toString());

          console.log("MQTT:", data);

          if (data.status === "SUCCESS") {
            document.getElementById("status").innerHTML = "✅ ชำระเงินสำเร็จ";

            document.getElementById("qr").style.display = "none";

            mqttClient.end();
          }

          if (data.status === "FAILED") {
            document.getElementById("status").innerHTML = "❌ ชำระเงินล้มเหลว";
          }

          if (data.status === "CANCELLED") {
            document.getElementById("status").innerHTML =
              "⚠️ ยกเลิกการชำระเงิน";
          }
        });
      }

      // ================= CREATE QR =================
      async function pay(amount) {
        const device_id = document.getElementById("device_id").value || "esp32";

        const product = document.getElementById("product").value || "สินค้า";

        const res = await fetch("/create-qr", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount, device_id, product }),
        });

        const data = await res.json();

        if (data.success) {
          currentOrderId = data.orderId;

          document.getElementById("qr").src = data.qr;
          document.getElementById("qr").style.display = "block";

          document.getElementById("status").innerText =
            "📱 รอสแกน...\nOrder: " + data.orderId;

          // 🔥 connect MQTT
          connectMQTT(data.orderId);
        }
      }

      // ================= CHECK (สำคัญ) =================
      async function checkPayment() {
        if (!currentOrderId) return;

        document.getElementById("status").innerText = "🔍 กำลังตรวจสอบ...";
        renderStatus("");

        try {
          const res = await fetch(
            "https://bluetooth-congressional-different-critics.trycloudflare.com/check-order",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ orderId: currentOrderId }),
            }
          );

          const data = await res.json();
          const status = data?.data?.result;

          if (status === "SUCCESS") {
            document.getElementById("status").innerText = "✅ ชำระเงินสำเร็จ!";
            renderStatus("SUCCESS");

            document.getElementById("qr").style.display = "none";
          } else if (status === "FAIL") {
            document.getElementById("status").innerText = "❌ ชำระเงินล้มเหลว";
            renderStatus("FAIL");
          } else if (status === "CANCEL") {
            document.getElementById("status").innerText =
              "⚠️ ยกเลิกการชำระเงิน";
            renderStatus("CANCEL");
          } else {
            document.getElementById("status").innerText = "⌛ ยังไม่ชำระเงิน";
          }
        } catch (err) {
          console.error(err);
          document.getElementById("status").innerText = "❌ Error";
          renderStatus("FAIL");
        }
      }

      // ================= RESET =================
      function resetUI() {
        currentOrderId = null;

        document.getElementById("qr").style.display = "none";
        document.getElementById("status").innerText = "กรุณาเลือกจำนวนเงิน";
        document.getElementById("checkBtn").disabled = true;
        document.getElementById("resultIcon").innerHTML = "";

        document
          .querySelectorAll(".btn-amount")
          .forEach((btn) => (btn.disabled = false));
      }
    </script>
  </body>
</html>
